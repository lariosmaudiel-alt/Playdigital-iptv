name: Actualizador de Canales

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta cada 6 horas
  workflow_dispatch: # Permite ejecutarlo manualmente

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Damos permisos explícitos al robot para escribir cambios en el repositorio
    permissions:
      contents: write

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10' # Corregido de python-state a python-version

    - name: Instalar dependencias y Playwright
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
        python -m playwright install chromium --with-deps

    - name: Ejecutar Extractor Inteligente
      run: python actualizar_lista.py

    - name: Guardar cambios en la lista M3U
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add lista_automatica.m3u
        
        # Solo hace commit si el archivo realmente cambió, evitando el error 128
        if ! git diff --cached --quiet; then
          git commit -m "Lista M3U actualizada automáticamente con Playwright"
          git push
        else
          print "No hay cambios detectados en la lista."
        fi
