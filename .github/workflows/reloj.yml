name: Actualizador de Canales

on:
  schedule:
    - cron: '0 */6 * * *' # Se ejecuta automáticamente cada 6 horas
  workflow_dispatch: # Te permite ejecutarlo manualmente con el botón gris

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-state: '3.10'

    - name: Instalar dependencias y Playwright
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
        python -m playwright install chromium --with-deps

    - name: Ejecutar Extractor Inteligente
      run: python actualizar_lista.py

    - name: Guardar cambios en la lista M3U
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add lista_automatica.m3u
        git diff --quiet && git diff --staged --quiet || (git commit -m "Lista M3U actualizada automáticamente con Playwright" && git push)
